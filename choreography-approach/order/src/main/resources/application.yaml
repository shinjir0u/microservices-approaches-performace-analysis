spring:
  application:
    name: order
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
      format_sql: true
  datasource:
    url: ${ORDER_DB_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  rabbitmq:
    host: ${RABBITMQ_HOST}
    virtual-host: ${SPRING_RABBITMQ_VHOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    order:
      created:
        queue: ${ORDER_CREATED_QUEUE}
        exchange: ${ORDER_CREATED_EXCHANGE}
        routingKey: ${ORDER_CREATED_ROUTINGKEY}
    payment:
      charged:
        queue: ${PAYMENT_CHARGED_QUEUE}
        exchange: ${PAYMENT_CHARGED_EXCHANGE}
        routingKey: ${PAYMENT_CHARGED_ROUTINGKEY}
    inventory:
      reserved:
        queue: ${INVENTORY_CHARGED_QUEUE}
        exchange: ${INVENTORY_CHARGED_EXCHANGE}
        routingKey: ${INVENTORY_CHARGED_ROUTINGKEY}

server:
  port: 8080
