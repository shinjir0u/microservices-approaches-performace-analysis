spring:
  application:
    name: order
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
      format_sql: true
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${ORDER_USER}
    password: ${ORDER_PASSWORD}
    driver-class-name: org.postgresql.Driver
  rabbitmq:
    host: ${RABBITMQ_HOST}
    virtual-host: ${SPRING_RABBITMQ_VHOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    order:
      created:
        queue: ${ORDER_CREATED_QUEUE}
        exchange: ${ORDER_CREATED_EXCHANGE}
        routingKey: ${ORDER_CREATED_ROUTINGKEY}

server:
  port: 8080
